name: Checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # Pins uv's view of PyPI and keys the uv cache below.
  # Bump this date to pick up newer tool releases and invalidate the cache.
  UV_EXCLUDE_NEWER: "2026-07-14"

jobs:
  checks:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # betterleaks scans the full commit history
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8
        id: setup-uv
        with:
          enable-cache: true
          cache-dependency-glob: ""
          cache-suffix: tools-${{ env.UV_EXCLUDE_NEWER }}
          prune-cache: false

      - name: Use cache-only uv on cache hits
        if: steps.setup-uv.outputs.cache-hit == 'true'
        run: echo "UV_OFFLINE=1" >> "$GITHUB_ENV"

      - name: Install verification tools
        run: |
          brew install shellcheck fish yamllint betterleaks actionlint stylua
          npm install -g markdownlint-cli2

      - name: Install PowerShell test modules
        shell: pwsh
        run: Install-PSResource -Name Pester, PSScriptAnalyzer -TrustRepository -Quiet -ErrorAction Stop

      - name: Lint workflows
        run: actionlint

      - name: Run test suites
        run: make test

      - name: Scan history for secrets
        run: make secrets
