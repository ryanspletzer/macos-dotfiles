name: Checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # Pins uv's view of PyPI and keys the uv cache below.
  # Bump this date to pick up newer tool releases and invalidate the cache.
  UV_EXCLUDE_NEWER: "2026-07-14"
  # Pins the uv binary itself and keys the cache below; a floating "latest"
  # uv can change the cache format (as 0.11.30 did), which orphans the
  # restored cache and hard-fails under UV_OFFLINE=1. Bump with the date.
  UV_VERSION: "0.11.32"

jobs:
  checks:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # betterleaks scans the full commit history
          fetch-depth: 0
          persist-credentials: false

      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        id: setup-uv
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: ""
          cache-suffix: tools-${{ env.UV_EXCLUDE_NEWER }}-uv${{ env.UV_VERSION }}
          prune-cache: false

      - name: Use cache-only uv on cache hits
        if: steps.setup-uv.outputs.cache-hit == 'true'
        run: echo "UV_OFFLINE=1" >> "$GITHUB_ENV"

      - name: Install verification tools
        run: |
          brew install shellcheck fish yamllint betterleaks actionlint stylua
          npm install -g markdownlint-cli2

      - name: Install PowerShell test modules
        shell: pwsh
        run: Install-PSResource -Name Pester, PSScriptAnalyzer -TrustRepository -Quiet -ErrorAction Stop

      - name: Lint workflows
        run: actionlint

      - name: Run test suites
        run: make test

      - name: Scan history for secrets
        run: make secrets
