---
"$schema": https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
blocks:
- type: prompt
  alignment: left
  segments:
  - template: "{{ .Model.DisplayName }}"
    foreground: "#c386f1"
    background: transparent
    type: copilot_cli
    style: plain
  - options:
      cache_duration: none
      folder_separator_icon: "  "
      home_icon: "~"
      style: folder
    template: " \U0000E5FF {{ .Path }}"
    foreground: "#ff479c"
    background: transparent
    type: path
    style: plain
  - options:
      cache_duration: none
      fetch_stash_count: true
      fetch_status: true
      fetch_upstream_icon: true
    template: " {{ .UpstreamIcon }} {{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} \uF044 {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} \uF046 {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} \ueb4b {{ .StashCount }}{{ end }}"
    foreground: "#2e9599"
    background: transparent
    type: git
    style: plain
    foreground_templates:
    - "{{ if or (.Working.Changed) (.Staging.Changed) }}#FFEB3B{{ end }}"
    - "{{ if and (gt .Ahead 0) (gt .Behind 0) }}#FFCC80{{ end }}"
    - "{{ if gt .Ahead 0 }}#B388FF{{ end }}"
    - "{{ if gt .Behind 0 }}#B388FB{{ end }}"
  - template: " +{{ .Cost.TotalLinesAdded }}/-{{ .Cost.TotalLinesRemoved }}"
    foreground: "#83769c"
    background: transparent
    type: copilot_cli
    style: plain
  - template: "{{ if gt .Cost.TotalPremiumRequests 0 }}   {{ .Cost.TotalPremiumRequests }}{{ end }}"
    foreground: "#c9a227"
    background: transparent
    type: copilot_cli
    style: plain
  - template: " {{ .FormattedTokens }} ({{ .TokenUsagePercent }}%) {{ .TokenGauge }}"
    foreground: "#2e9599"
    background: transparent
    type: copilot_cli
    style: plain
  - options:
      cache_duration: none
      time_format: 3:04 PM
    template: " \U0000E385 {{ .CurrentDate | date .Format }}"
    foreground: "#2e9599"
    background: transparent
    type: time
    style: plain
version: 4
